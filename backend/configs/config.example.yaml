app:
  port: 8080
mysql:
  dsn: root:root@tcp(mysql:3306)/shiro_email?parseTime=true
redis:
  addr: redis:6379
jwt:
  secret: dev-secret
providers:
  cloudflare_api_base_url: https://api.cloudflare.com/client/v4
