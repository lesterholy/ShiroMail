legacy_mail_sync:
  api_url: http://legacy-mail-sync:9000
  sync_enabled: false
mail:
  storage_path: ./data/mail
smtp:
  enabled: true
  listen_addr: 0.0.0.0:2525
  hostname: shiro.local
  max_bytes: 10485760
